version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
